<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto y Sugerencias</title>
    <link rel="stylesheet" href="css-flex/contacto.css">
</head>

<body>
<header>
    <h1>Mi Tienda</h1>
    <nav>
        <a href="index.html">INICIO</a>
        <a href="productos.html">Productos</a>
        <a href="contacto.html" >Contacto</a>
    </nav>
</header>

<main class="form-seccion">
    <div class="form-card">
        <h2>Contáctanos</h2>
        <p>¿Tienes una idea o sugerencia para mejorar nuestros productos? Escríbenos y la tendremos en cuenta.</p>

        <form action="/procesar-formulario" method="post" class="formulario">
            
            <div class="campo">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre">
            </div>

            <div class="campo">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" required placeholder="correo@ejemplo.com">
            </div>

            <div class="campo">
                <label for="asunto">Asunto</label>
                <input type="text" id="asunto" name="asunto" value="Sugerencia de producto" readonly>
            </div>

            <div class="campo">
                <label for="sugerencia">Tu sugerencia</label>
                <textarea id="sugerencia" name="sugerencia" rows="5" required placeholder="Describe tu idea..."></textarea>
            </div>

            <button type="submit" class="btn-enviar">Enviar mensaje</button>
        </form>

        <p class="mensaje-agradecimiento">¡Gracias por ayudarnos a mejorar! 💙</p>
    </div>
</main>

<footer>
    <p>&copy; 2026 Mi Tienda</p>
</footer>
</body>
</html>
